<!DOCTYPE html>
<html>

<head>

    <title>Student Registration</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, sans-serif;

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
        }

        .container{

            background:white;

            padding:40px;

            border-radius:20px;

            width:400px;

            text-align:center;

            box-shadow:0 10px 25px rgba(0,0,0,0.2);

            animation:slideUp 1s ease;
        }

        h1{
            margin-bottom:20px;
            color:#333;
        }

        input, select{

            width:100%;

            padding:12px;

            margin:10px 0;

            border:1px solid #ccc;

            border-radius:10px;

            outline:none;

            transition:0.3s;
        }

        input:focus,
        select:focus{

            border-color:#667eea;

            transform:scale(1.03);
        }

        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:10px;

            background:#667eea;

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            background:#5a67d8;

            transform:scale(1.05);
        }

        @keyframes slideUp{

            from{
                opacity:0;
                transform:translateY(50px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

<div class="container">

<h1>Student Registration</h1>

<form action="/submit" method="POST">

    <input
    type="text"
    name="name"
    placeholder="Enter Name"
    required>

    <input
    type="email"
    name="email"
    placeholder="Enter Email"
    required>

    <input
    type="tel"
    name="phone"
    placeholder="Enter Phone Number"
    required>

    <select name="gender" required>

        <option value="">
            Select Gender
        </option>

        <option value="Male">
            Male
        </option>

        <option value="Female">
            Female
        </option>

        <option value="Other">
            Other
        </option>

    </select>

    <button type="submit">
        Register
    </button>

</form>

</div>

</body>
</html>
